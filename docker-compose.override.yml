version: '3.8'

# Development override configuration
# Run with: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_TO_FILE=true
      - NLP_MODEL_NAME=distilbert-base-uncased-finetuned-sst-2-english
      - NLP_DEVICE=cpu
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    
  redis:
    ports:
      - "6379:6379"
    
  # Add development tools
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - redis
