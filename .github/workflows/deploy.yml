name: Deploy AI Galaxy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio httpx fastapi
          pip install -r backend/requirements.txt
      
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app
          pytest tests/integration/ -v
          pytest tests/load/ -v --benchmark-only
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildx-builder: v1
          buildx-flags: "--platform linux/amd64"
      
      - name: Login to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      
      - name: Build and push Docker image
        run: |
          docker buildx build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-galaxy:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-galaxy:latest \
            --load buildx \
            --cache-from type=gha \
            --cache-to type=gha \
            .
        
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-galaxy:${{ github.sha }}
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-galaxy:latest
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-galaxy \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-galaxy:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --max-concurrency 80 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "FULL_PASSWORD=galaxy2026"
