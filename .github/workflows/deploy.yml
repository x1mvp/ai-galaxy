name: Deploy AI Galaxy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-galaxy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # dependencies already installed via requirements.txt
          pip install -r backend/requirements.txt

      - name: Run unit and integration tests
        run: |
          cd backend
          pytest tests/ -v --no-cov

      # Load/benchmark tests are slow and environment-sensitive.
      # Run them manually or on a separate scheduled workflow.
      # - name: Run load tests
      #   run: pytest tests/load/ -v --benchmark-only

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    # Only deploy on pushes to main, not on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to push to GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-galaxy \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --max-concurrency 80 \
            --min-instances 1 \
            --max-instances 10 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars "FULL_PASSWORD=${{ secrets.FULL_PASSWORD }}"
