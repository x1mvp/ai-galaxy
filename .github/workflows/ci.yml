# .github/workflows/ci.yml  — relevant jobs section
#
# FIX 1: collapse the two competing pip install steps into one.
#         All packages (test tooling + app dependencies) live in
#         backend/requirements.txt so there is a single source of truth
#         and no version can be silently downgraded between steps.

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Single install step — no more version fights.
      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest --cov=app --cov-report=xml -v
